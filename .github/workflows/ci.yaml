name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: macOS
          - os: macos-15-intel
            artifact_name: macOS-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: TicketZako/FuckBili
          ref: main
          token: ${{ secrets.REPO_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create temporary script for Nuitka setup
        run: |
          echo "print('Nuitka environment setup')" > nuitka_setup_temp.py

      - name: Install and Cache Nuitka with Nuitka-Action
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: nuitka_setup_temp.py
          mode: standalone
        continue-on-error: true

      - name: Cleanup temporary build files (macOS)
        if: runner.os == 'macOS'
        run: |
          rm -f nuitka_setup_temp.py
          rm -rf build nuitka_setup_temp.dist nuitka_setup_temp.build

      - name: Cleanup temporary build files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Path nuitka_setup_temp.py -ErrorAction SilentlyContinue
          Remove-Item -Path build, nuitka_setup_temp.dist, nuitka_setup_temp.build -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build with Cython and Nuitka
        run: python ./script/build_ultimate.py

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $os = "windows"
          $arch = (python -c "import platform; print(platform.machine().lower())")
          $file = Get-ChildItem -Path dist -File | Select-Object -First 1
          if ($file) {
            $basename = $file.BaseName
            $ext = $file.Extension
            $newname = "${basename}-${version}-${os}-${arch}${ext}"
            Rename-Item -Path $file.FullName -NewName $newname
            Write-Host "Renamed to: $newname"
          }

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          version="${{ inputs.version }}"
          os="darwin"
          arch=$(python -c "import platform; print(platform.machine().lower())")
          file=$(ls dist/* 2>/dev/null | head -n 1 | xargs -n 1 basename)
          if [ -n "$file" ]; then
            filename=$(basename "$file")
            if [[ "$filename" == *.* ]] && [[ "${filename%.*}" != "" ]]; then
              basename="${filename%.*}"
              ext=".${filename##*.}"
            else
              basename="$filename"
              ext=""
            fi
            newname="${basename}-${version}-${os}-${arch}${ext}"
            mv "dist/$file" "dist/$newname"
            echo "Renamed to: $newname"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ inputs.version }}
          path: dist/*
          retention-days: 30

  build-linux:
    strategy:
      matrix:
        include:
          - libc: glibc
            image: androsh7/nuitka-compiler:latest-x86_64-glibc-2.17-py3.13
            artifact_name: Linux
            os_tag: linux
          - libc: musl
            image: androsh7/nuitka-compiler:latest-x86_64-musl-1.2-py3.13
            artifact_name: Linux-musl
            os_tag: linux-musl

    runs-on: ubuntu-22.04
    # Do not use actions/setup-python here: it installs host-matched binaries that
    # fail inside these containers due to GLIBC / musl mismatch.
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: TicketZako/FuckBili
          ref: main
          token: ${{ secrets.REPO_TOKEN }}

      - name: Install build tools
        run: |
          if ! command -v git >/dev/null; then
            yum install -y git || (apt-get update && apt-get install -y git)
          fi
          python -m pip install --upgrade pip
          pip install -U "git+https://github.com/Nuitka/Nuitka.git@main"
          pip install -r requirements.txt

      - name: Build with Cython and Nuitka
        run: python ./script/build_ultimate.py

      - name: Rename artifact
        run: |
          version="${{ inputs.version }}"
          os="${{ matrix.os_tag }}"
          arch=$(python -c "import platform; print(platform.machine().lower())")
          file=$(ls dist/* 2>/dev/null | head -n 1 | xargs -n 1 basename)
          if [ -n "$file" ]; then
            filename=$(basename "$file")
            if [[ "$filename" == *.* ]] && [[ "${filename%.*}" != "" ]]; then
              basename="${filename%.*}"
              ext=".${filename##*.}"
            else
              basename="$filename"
              ext=""
            fi
            newname="${basename}-${version}-${os}-${arch}${ext}"
            mv "dist/$file" "dist/$newname"
            echo "Renamed to: $newname"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-${{ inputs.version }}
          path: dist/*
          retention-days: 30

  release:
    needs: [build, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "Artifacts structure:"
          find artifacts -type f || echo "No files found"
          ls -la artifacts/ || echo "Artifacts directory not found"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.REPO_TOKEN }}
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
